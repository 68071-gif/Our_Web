<script>
auth.onAuthStateChanged(function(user){
  if(!user){
    window.location="login.html";
  }else{
    document.getElementById("userEmail").textContent = user.email;
    document.getElementById("dashboard").style.display = "block";
  }
});

function logout(){
  auth.signOut().then(function(){
    alert("Logged out");
    window.location="login.html";
  });
}
</script>
