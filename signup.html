<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup – MUI_HUB</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="firebase.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">MUI_HUB</a>
  </div>
</nav>

<section>
  <div class="container-custom">
    <h2>Signup</h2>
    <div class="row justify-content-center">
      <div class="col-md-4">
        <form id="signup-form">
          <input type="email" id="email" class="form-control" placeholder="Email" required>
          <input type="password" id="password" class="form-control" placeholder="Password (min 6 chars)" required>
          <button class="btn btn-primary btn-lg w-100">Signup</button>
        </form>
        <p class="mt-3 text-center">Already have an account? <a href="login.html">Login</a></p>
      </div>
    </div>
  </div>
</section>

<footer>© 2026 MUI_HUB</footer>
<a href="https://wa.me/923485270251" target="_blank" class="whatsapp-btn">💬</a>

<script>
document.getElementById("signup-form").addEventListener("submit", function(e){
  e.preventDefault();
  var email = document.getElementById("email").value;
  var password = document.getElementById("password").value;
  auth.createUserWithEmailAndPassword(email, password)
    .then(()=>{alert("Signup Successful ✅");window.location="login.html";})
    .catch(err=>alert(err.message));
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
